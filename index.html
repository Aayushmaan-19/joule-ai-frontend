<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="style.css" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>JOULE AI</title>

    <link rel="icon" type="image/png" href="Assets/logo/favicon.png" />

    <meta
      name="description"
      content="Joule AI is an advanced AI platform offering intelligent tools, chat assistance, productivity features, and AI-powered solutions."
    />

    <meta
      name="keywords"
      content="AI, artificial intelligence, AI assistant, chatbot, productivity, Joule AI"
    />

    <meta name="author" content="Joule AI" />

    <link
      href="https://fonts.googleapis.com/css2?family=Allura&display=swap"
      rel="stylesheet"
    />

    <meta name="google-site-verification" content="nQcfpyCJHSj4HTOt65jLCxHhZ356HddPQqUf6c6xeZI" />
  </head>

  <body>
    <!-- LOADING SCREEN: aurora condensation -->
    <div id="loadingScreen" class="loading-screen">
      <canvas id="loadingCanvas" class="loading-canvas"></canvas>

      <img
        id="loadingLogo"
        class="loading-logo"
        src="Assets/Images/bot.png"
        alt="Joule AI"
      />

      <div class="loading-text" id="loadingText">JOULE AI</div>

      <div class="loading-bar-wrapper">
        <div class="loading-bar-track">
          <div class="loading-bar-fill" id="loadingBarFill"></div>
        </div>
        <div class="loading-percent" id="loadingPercent">0%</div>
      </div>
    </div>

    <!-- Background layers (fixed, behind everything) -->
    <div class="aurora"></div>
    <div class="clouds"></div>
    <div class="mountains"></div>
    <div class="fog-layer"></div>
    <div class="fog-layer fog-layer-2"></div>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>
    <div class="ambient ambient-3"></div>

    <!-- AUTH MODAL -->
    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="auth-modal">
        <button id="closeModal" class="close-btn">×</button>

        <div id="authView" class="auth-view">
          <h2 id="authTitle">Welcome</h2>
          <p class="subtitle" id="authSubtitle">Create your Joule account</p>

          <form id="authForm">
            <input
              id="authEmail"
              type="email"
              placeholder="Email"
              autocomplete="email"
              required
            />

            <div class="password-field">
              <input
                id="authPassword"
                type="password"
                placeholder="Password"
                autocomplete="current-password"
                minlength="6"
                required
              />
              <button
                type="button"
                id="togglePassword"
                class="password-toggle"
                aria-label="Show password"
              >
                <svg
                  id="eyeIcon"
                  viewBox="0 0 24 24"
                  width="20"
                  height="20"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    id="eyeShape"
                    d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12Z"
                  />
                  <circle id="eyePupil" cx="12" cy="12" r="3.2" />
                </svg>
              </button>
            </div>

            <p id="authError" class="auth-error hidden"></p>
            <button type="submit" class="continue-btn" id="authSubmitBtn">
              Continue
            </button>
          </form>

          <p class="auth-toggle">
            <span id="authToggleText">Already have an account?</span>
            <button type="button" id="authToggleBtn" class="link-btn">
              Log in
            </button>
          </p>

          <div class="divider">
            <span></span>
            <p>OR</p>
            <span></span>
          </div>
          <button class="google-btn">Continue with Google</button>
        </div>

        <!-- OTP VERIFICATION VIEW -->
        <div id="otpView" class="auth-view hidden">
          <h2>Verify your email</h2>
          <p class="subtitle">
            Enter the 6-digit code sent to
            <strong id="otpEmailDisplay"></strong>
          </p>

          <form id="otpForm" class="otp-form">
            <div class="otp-inputs" id="otpInputs">
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                class="otp-box"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                class="otp-box"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                class="otp-box"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                class="otp-box"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                class="otp-box"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                class="otp-box"
              />
            </div>

            <p id="otpError" class="auth-error hidden"></p>
            <p id="otpSuccess" class="auth-success hidden"></p>
            <button type="submit" class="continue-btn" id="otpSubmitBtn">
              Verify
            </button>
          </form>

          <p class="auth-toggle">
            <span id="otpResendText">Didn't get a code?</span>
            <button type="button" id="otpResendBtn" class="link-btn">
              Resend code
            </button>
          </p>
        </div>
      </div>
    </div>

    <!-- PROFILE PANEL -->
    <div id="profileOverlay" class="modal-overlay hidden">
      <div class="profile-panel">
        <button id="closeProfile" class="close-btn">×</button>
        <h2>Your Profile</h2>

        <div class="profile-avatar-preview">
          <img
            id="profilePreviewImg"
            src="Assets/Avatars/avatar1.png"
            alt="Avatar"
          />
        </div>

        <div class="avatar-grid" id="avatarGrid">
          <button
            class="avatar-option"
            data-avatar="Assets/Avatars/avatar1.png"
          >
            <img src="Assets/Avatars/avatar1.png" alt="" />
          </button>
          <button
            class="avatar-option"
            data-avatar="Assets/Avatars/avatar2.png"
          >
            <img src="Assets/Avatars/avatar2.png" alt="" />
          </button>
          <button
            class="avatar-option"
            data-avatar="Assets/Avatars/avatar3.png"
          >
            <img src="Assets/Avatars/avatar3.png" alt="" />
          </button>
          <button
            class="avatar-option"
            data-avatar="Assets/Avatars/avatar4.png"
          >
            <img src="Assets/Avatars/avatar4.png" alt="" />
          </button>
          <button
            class="avatar-option"
            data-avatar="Assets/Avatars/avatar5.png"
          >
            <img src="Assets/Avatars/avatar5.png" alt="" />
          </button>
          <button
            class="avatar-option"
            data-avatar="Assets/Avatars/avatar6.png"
          >
            <img src="Assets/Avatars/avatar6.png" alt="" />
          </button>
        </div>

        <form id="profileForm">
          <label class="field-label" for="profileName">Display name</label>
          <input
            id="profileName"
            type="text"
            placeholder="Your name"
            maxlength="40"
          />
          <label class="field-label">Email</label>
          <input id="profileEmail" type="email" disabled />
          <p id="profileStatus" class="auth-success hidden"></p>
          <button type="submit" class="continue-btn">Save changes</button>
        </form>

        <button id="logoutBtn" class="logout-btn">Log out</button>
      </div>
    </div>

    <!-- Voice overlay (full-screen, above everything) -->
    <div id="voiceOverlay">
      <div class="voice-particles"></div>
      <div class="voice-orb-container">
        <div class="voice-countdown"></div>
        <div class="voice-glow"></div>
        <div class="voice-core"></div>
        <div class="voice-wave"></div>
      </div>
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <div id="voiceStatus" class="voice-status">Ready</div>
      <div id="liveTranscript" class="voice-transcript"></div>
      <div class="voice-hint">Stop speaking to auto-send</div>
    </div>

    <!-- ======================== APP LAYOUT ======================== -->
    <div id="app">
      <!-- SIDEBAR (injected here by sidebar.js) -->

      <!-- MAIN COLUMN -->
      <div id="main">
        <div class="header-wrapper">
          <div class="header">
            <svg class="logo-svg" viewBox="0 0 60 60">
              <path class="j-path" d="M38 8 L38 34 Q38 52 20 52 Q10 52 10 40" />
              <path class="j-tail" d="M40 18 Q58 30 42 52" />
            </svg>
            <div class="logo-text">oule</div>
          </div>
        </div>

        <div class="signature">Owner : Aayushmaan</div>

        <nav class="navbar">
          <button
            id="sidebarOpenBtn"
            class="sidebar-open-btn hidden"
            aria-label="Toggle chat history"
            title="Chat history"
          >
            <span class="sidebar-open-icon"></span>
          </button>
          <button id="openAuth" class="signup-btn">Sign Up</button>
          <button
            id="profileBtn"
            class="profile-btn hidden"
            aria-label="Open profile"
          >
            <img
              id="profileAvatar"
              src="Assets/Avatars/avatar1.png"
              alt="Profile"
            />
          </button>
        </nav>

        <div class="controls">
          <button class="icon-btn" id="musicBtn" aria-label="Toggle Music">
            <img
              src="Assets/Icons/play.svg"
              class="icon"
              id="musicIcon"
              alt=""
            />
          </button>
          <button class="icon-btn" id="clearBtn" aria-label="Clear Chat">
            <img src="Assets/Icons/trash.svg" class="icon" alt="" />
          </button>
          <button class="icon-btn" id="themeBtn" aria-label="Toggle Theme">
            <img
              src="Assets/Icons/sparkles.svg"
              class="icon"
              id="themeIcon"
              alt=""
            />
          </button>
        </div>

        <div class="wake-wrapper">
          <button class="wake-btn" id="wakeBtn">
            <span class="wake-btn-emoji" id="wakeBtnEmoji">🌙</span>
            <span class="wake-btn-label" id="wakeBtnLabel">Wake Me Up</span>
          </button>
        </div>

        <div class="chat-container" id="chat"></div>

        <div class="input-area">
          <div class="tools-wrapper">
            <button class="icon-btn" id="toolsBtn" aria-label="More tools" aria-haspopup="true" aria-expanded="false">
              <img src="Assets/Icons/plus.svg" class="icon" id="toolsIcon" alt="" />
            </button>

            <div class="tools-menu hidden" id="toolsMenu" role="menu">
              <button type="button" class="tools-menu-item" id="imageGenToggle" role="menuitemcheckbox" aria-checked="false">
                <span class="tools-menu-item-icon">
                  <img src="Assets/Icons/image.svg" alt="" />
                </span>
                <span class="tools-menu-item-label">Image Generation</span>
              </button>

              <div class="tools-menu-hint">More features coming soon!</div>
            </div>
          </div>

          <input id="input" placeholder="Type message..." autocomplete="off" />
          <button class="icon-btn" id="micBtn" aria-label="Voice Input">
            <span class="mic-ring"></span>
            <img src="Assets/Icons/mic.svg" class="icon" id="micIcon" alt="" />
          </button>
          <button class="icon-btn" id="sendBtn" aria-label="Send Message">
            <img src="Assets/Icons/send.svg" class="icon" alt="" />
          </button>
        </div>
      </div>
      <!-- /#main -->
    </div>
    <!-- /#app -->

    <audio id="audio"></audio>
    <div id="voice-toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="./js/main.js"></script>

    <footer class="footer">
      <a href="/privacy-policy.html" data-legal="privacy">Privacy Policy</a>
      <a href="/terms.html" data-legal="terms">Terms of Service</a>
      <a href="/about.html" data-legal="about">About Us</a>
      <a href="/contact.html" data-legal="contact">Contact</a>
    </footer>
  </body>
</html>
